name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: ddas_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      TEST_DATABASE_URL: postgres://postgres:postgres@localhost:5432/ddas_test
      TEST_S3_ENDPOINT: http://127.0.0.1:9000
      TEST_S3_ACCESS_KEY_ID: test
      TEST_S3_SECRET_ACCESS_KEY: testtest123
    steps:
      - uses: actions/checkout@v4
      # MinIO for the s3 blob-driver suites (the minio image needs a command,
      # which GitHub service containers can't set — hence plain docker run).
      - name: Start MinIO
        run: |
          docker run -d --name minio \
            -e MINIO_ROOT_USER=test -e MINIO_ROOT_PASSWORD=testtest123 \
            -p 127.0.0.1:9000:9000 minio/minio server /data
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm test

  helm-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: helm lint deploy/helm/ddas --set database.url=postgres://x:x@db:5432/ddas
      - run: helm template ddas deploy/helm/ddas --set database.url=postgres://x:x@db:5432/ddas > /dev/null

  browser-smoke:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      SMOKE_DATABASE_URL: postgres://postgres:postgres@localhost:5432/ddas_smoke
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: pnpm --filter @ddas/web exec playwright install --with-deps chromium
      - run: pnpm --filter @ddas/web e2e

  # Release: pushing a tag v<version> builds the production image from
  # deploy/Dockerfile (repo-root context, multi-arch) and publishes it to
  # GHCR as ghcr.io/legalquants/lqgovernance-ddas:<version> and :latest.
  # The registry path is DELIBERATELY hardcoded lowercase: the repo is being
  # transferred to the LegalQuants org and renamed LQGovernance-DDAS before
  # any tag is pushed, and deriving it from github.repository would both
  # break on the rename timing and violate GHCR's lowercase requirement.
  publish-image:
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    needs: [build-test, helm-lint]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Derive version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/legalquants/lqgovernance-ddas:${{ steps.version.outputs.version }}
            ghcr.io/legalquants/lqgovernance-ddas:latest

  dco:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Check DCO sign-off
        run: |
          missing=0
          for sha in $(git rev-list ${{ github.event.pull_request.base.sha }}..${{ github.event.pull_request.head.sha }}); do
            if ! git log -1 --format=%B "$sha" | grep -q '^Signed-off-by: '; then
              echo "Missing Signed-off-by: $sha"
              missing=1
            fi
          done
          exit $missing
