kind = "web"
previewPath = "/"
title = "GU Engine"
version = "1.0.0"
id = "artifacts/gu-engine"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 22098
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/gu-engine run dev"

[services.env]
PORT = "22098"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/gu-engine", "run", "build"]
publicDir = "artifacts/gu-engine/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
