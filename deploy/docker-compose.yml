# DDAS reference deployment — Phase 0 stub.
# Phase 1 adds the `app` service (single container: API + console + workers).
services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_USER: ddas
      POSTGRES_PASSWORD: ddas
      POSTGRES_DB: ddas
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ddas"]
      interval: 5s
      timeout: 3s
      retries: 10

