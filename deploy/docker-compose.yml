# DDAS reference deployment: `docker compose up` = the whole product.
# Postgres + one application container (API, web console, workers).
services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: ddas
      POSTGRES_PASSWORD: ddas # change in production
      POSTGRES_DB: ddas
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ddas"]
      interval: 5s
      timeout: 3s
      retries: 10

  app:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://ddas:ddas@postgres:5432/ddas
      # First boot creates this admin (only if no admin exists yet):
      DDAS_ADMIN_EMAIL: admin@example.com
      DDAS_ADMIN_PASSWORD: change-me-please # >= 12 chars
      # LLM fact extraction (optional until you submit requests):
      # DDAS_EXTRACTION_PROVIDER: anthropic
      # DDAS_EXTRACTION_MODEL: claude-sonnet-5
      # DDAS_EXTRACTION_API_KEY: sk-ant-...
    ports:
      # Override with DDAS_PORT when 3000 is taken (e.g. DDAS_PORT=3210 docker compose up)
      - "${DDAS_PORT:-3000}:3000"
    volumes:
      - blobs:/data/blobs

volumes:
  pgdata:
  blobs:
