# DDAS reference values. Runs single-replica by default; set replicaCount > 1
# for HA (N app replicas over one Postgres). With replicas > 1 the blob store
# must be shared: set env.DDAS_BLOB_DRIVER=s3 (+ the DDAS_S3_* env vars) or
# blobs.accessMode=ReadWriteMany on an RWX storage class — the chart refuses
# to render otherwise. See docs/ha.md for the supported topology.
replicaCount: 1

image:
  repository: ghcr.io/saifalyounan/ddas
  tag: "" # defaults to appVersion
  pullPolicy: IfNotPresent

# Bring your own Postgres. Either set databaseUrl (the chart writes it into
# a Secret) or point existingSecret at one holding a DATABASE_URL key.
database:
  url: ""
  existingSecret: ""
  existingSecretKey: DATABASE_URL

# First-boot admin (created only if no admin exists). Leave empty to skip.
admin:
  email: ""
  password: ""

# LLM fact extraction (see .env.example). "stub" = manual-entry pipeline.
extraction:
  provider: ""
  model: ""
  apiKey: ""
  baseUrl: ""

# fs-driver blob volume (skipped entirely when env.DDAS_BLOB_DRIVER=s3).
blobs:
  size: 10Gi
  storageClassName: ""
  # ReadWriteOnce pins all pods to one node's volume. For replicaCount > 1
  # on the fs driver, set ReadWriteMany and an RWX-capable storage class —
  # but prefer the s3 driver (see docs/ha.md).
  accessMode: ReadWriteOnce

# Rendered only when replicaCount > 1: keeps at least minAvailable pod up
# through voluntary disruptions (node drains, upgrades).
podDisruptionBudget:
  enabled: true
  minAvailable: 1

# SIGTERM → Fastify drains in-flight requests, then the pod exits; the preStop
# sleep lets endpoint removal propagate before the drain starts.
terminationGracePeriodSeconds: 30

service:
  type: ClusterIP
  port: 3000

resources:
  requests:
    cpu: 250m
    memory: 512Mi
  limits:
    memory: 1Gi

env: {} # extra env vars, e.g. OIDC_* — see .env.example
