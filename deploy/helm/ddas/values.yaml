# LQGovernance - DDAS reference values. Runs single-replica by default; set replicaCount > 1
# for HA (N app replicas over one Postgres). With replicas > 1 the blob store
# must be shared: set env.DDAS_BLOB_DRIVER=s3 (+ the DDAS_S3_* env vars) or
# blobs.accessMode=ReadWriteMany on an RWX storage class — the chart refuses
# to render otherwise. See docs/ha.md for the supported topology.
replicaCount: 1

image:
  repository: ghcr.io/legalquants/lqgovernance-ddas
  tag: "" # defaults to appVersion
  pullPolicy: IfNotPresent

# Bring your own Postgres. Either set databaseUrl (the chart writes it into
# a Secret) or point existingSecret at one holding a DATABASE_URL key.
database:
  url: ""
  existingSecret: ""
  existingSecretKey: DATABASE_URL

# First-boot admin (created only if no admin exists). Leave empty to skip.
admin:
  email: ""
  password: ""

# LLM fact extraction (see .env.example). "stub" = manual-entry pipeline.
extraction:
  provider: ""
  model: ""
  apiKey: ""
  baseUrl: ""

# fs-driver blob volume (skipped entirely when env.DDAS_BLOB_DRIVER=s3).
blobs:
  size: 10Gi
  storageClassName: ""
  # ReadWriteOnce pins all pods to one node's volume. For replicaCount > 1
  # on the fs driver, set ReadWriteMany and an RWX-capable storage class —
  # but prefer the s3 driver (see docs/ha.md).
  accessMode: ReadWriteOnce

# Rendered only when replicaCount > 1: keeps at least minAvailable pod up
# through voluntary disruptions (node drains, upgrades).
podDisruptionBudget:
  enabled: true
  minAvailable: 1

# SIGTERM → Fastify drains in-flight requests, then the pod exits; the preStop
# sleep lets endpoint removal propagate before the drain starts.
terminationGracePeriodSeconds: 30

service:
  type: ClusterIP
  port: 3000

resources:
  requests:
    cpu: 250m
    memory: 512Mi
    ephemeral-storage: 256Mi
  limits:
    memory: 1Gi
    # Cap node-local scratch (multipart temp, logs) so a runaway upload can't
    # fill the node — matters most with the fs blob driver (infra-S3).
    ephemeral-storage: 1Gi

# Dedicated ServiceAccount; the app never calls the Kubernetes API, so its
# token is not mounted (infra-C5).
serviceAccount:
  create: true
  name: "" # defaults to the release fullname
  annotations: {}
  automountServiceAccountToken: false

# Restricted pod-level security context (infra-C5). The image already runs as
# the non-root `node` user (uid/gid 1000).
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  runAsGroup: 1000
  fsGroup: 1000 # so the non-root process can write the fs-driver blob PVC
  seccompProfile:
    type: RuntimeDefault

# Restricted container-level security context (infra-C5). readOnlyRootFilesystem
# is compatible: the app writes only to the blob PVC and a /tmp emptyDir.
securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop: ["ALL"]

# Optional default-deny NetworkPolicy (infra-C5): denies all ingress except the
# service port and all egress except DNS + Postgres. Off by default because it
# needs a NetworkPolicy-capable CNI; enable once you've confirmed yours.
networkPolicy:
  enabled: false
  # CIDR the database lives in (egress allow). Defaults to cluster-internal.
  databaseCidr: "10.0.0.0/8"
  databasePort: 5432

env: {} # extra env vars, e.g. OIDC_* — see .env.example
