{{- if .Values.networkPolicy.enabled }}
# Default-deny for DDAS pods (infra-C5): allow ingress only to the HTTP port,
# and egress only to DNS and Postgres. Requires a NetworkPolicy-capable CNI.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "ddas.fullname" . }}
  labels:
    {{- include "ddas.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: ddas
      app.kubernetes.io/instance: {{ .Release.Name }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - ports:
        - protocol: TCP
          port: 3000
  egress:
    # DNS resolution.
    - to: []
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # Postgres.
    - to:
        - ipBlock:
            cidr: {{ .Values.networkPolicy.databaseCidr | quote }}
      ports:
        - protocol: TCP
          port: {{ .Values.networkPolicy.databasePort }}
{{- end }}
