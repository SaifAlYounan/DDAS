apiVersion: v1
kind: Service
metadata:
  name: {{ include "ddas.fullname" . }}
  labels:
    {{- include "ddas.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: http
      name: http
  selector:
    app.kubernetes.io/name: ddas
    app.kubernetes.io/instance: {{ .Release.Name }}
