{{- $replicas := int .Values.replicaCount }}
{{- $blobDriver := default "fs" (index .Values.env "DDAS_BLOB_DRIVER") }}
{{- $fsBlobs := ne $blobDriver "s3" }}
{{- $sharedFs := eq .Values.blobs.accessMode "ReadWriteMany" }}
{{- if and (gt $replicas 1) $fsBlobs (not $sharedFs) }}
{{- fail "replicaCount > 1 needs shared blob storage: set env.DDAS_BLOB_DRIVER=s3 (+ the DDAS_S3_* env vars, recommended) or blobs.accessMode=ReadWriteMany on an RWX-capable storage class. See docs/ha.md." }}
{{- end }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "ddas.fullname" . }}
  labels:
    {{- include "ddas.labels" . | nindent 4 }}
spec:
  replicas: {{ $replicas }}
  strategy:
    {{- if and $fsBlobs (not $sharedFs) }}
    type: Recreate # single writer over the RWO blob volume
    {{- else }}
    type: RollingUpdate
    {{- end }}
  selector:
    matchLabels:
      app.kubernetes.io/name: ddas
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        {{- include "ddas.labels" . | nindent 8 }}
    spec:
      terminationGracePeriodSeconds: {{ .Values.terminationGracePeriodSeconds }}
      serviceAccountName: {{ include "ddas.serviceAccountName" . }}
      automountServiceAccountToken: {{ .Values.serviceAccount.automountServiceAccountToken }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: ddas
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          ports:
            - name: http
              containerPort: 3000
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "ddas.databaseSecretName" . }}
                  key: {{ .Values.database.existingSecretKey }}
            {{- if $fsBlobs }}
            - name: BLOB_DIR
              value: /data/blobs
            {{- end }}
            {{- if and .Values.admin.email .Values.admin.password }}
            - name: DDAS_ADMIN_EMAIL
              value: {{ .Values.admin.email | quote }}
            - name: DDAS_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "ddas.fullname" . }}-app
                  key: DDAS_ADMIN_PASSWORD
            {{- end }}
            {{- if .Values.extraction.provider }}
            - name: DDAS_EXTRACTION_PROVIDER
              value: {{ .Values.extraction.provider | quote }}
            {{- end }}
            {{- if .Values.extraction.model }}
            - name: DDAS_EXTRACTION_MODEL
              value: {{ .Values.extraction.model | quote }}
            {{- end }}
            {{- if .Values.extraction.apiKey }}
            - name: DDAS_EXTRACTION_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "ddas.fullname" . }}-app
                  key: DDAS_EXTRACTION_API_KEY
            {{- end }}
            {{- if .Values.extraction.baseUrl }}
            - name: DDAS_EXTRACTION_BASE_URL
              value: {{ .Values.extraction.baseUrl | quote }}
            {{- end }}
            {{- range $name, $value := .Values.env }}
            - name: {{ $name }}
              value: {{ $value | quote }}
            {{- end }}
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
          lifecycle:
            preStop:
              exec:
                # Let endpoint removal propagate before the SIGTERM drain starts.
                command: ["sleep", "5"]
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            # Writable scratch — readOnlyRootFilesystem needs a real /tmp.
            - name: tmp
              mountPath: /tmp
            {{- if $fsBlobs }}
            - name: blobs
              mountPath: /data/blobs
            {{- end }}
      volumes:
        - name: tmp
          emptyDir:
            sizeLimit: 256Mi
        {{- if $fsBlobs }}
        - name: blobs
          persistentVolumeClaim:
            claimName: {{ include "ddas.fullname" . }}-blobs
        {{- end }}
{{- if $fsBlobs }}
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "ddas.fullname" . }}-blobs
  labels:
    {{- include "ddas.labels" . | nindent 4 }}
spec:
  accessModes: [{{ .Values.blobs.accessMode }}]
  {{- if .Values.blobs.storageClassName }}
  storageClassName: {{ .Values.blobs.storageClassName }}
  {{- end }}
  resources:
    requests:
      storage: {{ .Values.blobs.size }}
{{- end }}
