{{- if not .Values.database.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "ddas.fullname" . }}-database
  labels:
    {{- include "ddas.labels" . | nindent 4 }}
type: Opaque
stringData:
  DATABASE_URL: {{ required "set database.url or database.existingSecret" .Values.database.url | quote }}
{{- end }}
{{- if or .Values.admin.password .Values.extraction.apiKey }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "ddas.fullname" . }}-app
  labels:
    {{- include "ddas.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{- if .Values.admin.password }}
  DDAS_ADMIN_PASSWORD: {{ .Values.admin.password | quote }}
  {{- end }}
  {{- if .Values.extraction.apiKey }}
  DDAS_EXTRACTION_API_KEY: {{ .Values.extraction.apiKey | quote }}
  {{- end }}
{{- end }}
